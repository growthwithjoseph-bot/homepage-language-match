<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Homepage Language Match</title>
<style>
  :root {
    --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; --bg: #f8fafc;
    --semantic: #2563eb; --lexical: #f59e0b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); background: #fff; }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .form { margin-top: 14px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.grow { flex: 1 1 240px; }
  .field label { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .field .hint { font-weight: 400; }
  .field input { padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; font-size: 14px; }
  .field input:focus { outline: 2px solid #93c5fd; border-color: #93c5fd; }
  #analyzeBtn { padding: 9px 18px; border: 0; border-radius: 7px; background: var(--ink);
    color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
  #analyzeBtn:disabled { opacity: .5; cursor: default; }
  #status { margin-top: 10px; color: var(--muted); font-size: 12.5px; }
  #progress { margin-top: 12px; }
  #progress[hidden] { display: none; }

  /* Playful "dog chasing a ball" scene while analysing. */
  .crawl-anim { display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; gap: 4px; }
  .crawl-scene { width: 280px; max-width: 90%; height: auto; overflow: visible; }
  .cs-ball { animation: csBallX 3s linear infinite; }
  .cs-ball-bounce { animation: csBounce .6s cubic-bezier(.3,0,.6,1) infinite; }
  @keyframes csBallX { from { transform: translateX(-20px); } to { transform: translateX(250px); } }
  @keyframes csBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-38px); } }
  .cs-dog { animation: csDogX 3s linear infinite; }
  @keyframes csDogX { from { transform: translateX(-64px); } to { transform: translateX(196px); } }
  .cs-dog-bob { animation: csBob .3s ease-in-out infinite; }
  @keyframes csBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  .cs-leg { transform-box: fill-box; transform-origin: top center; }
  .cs-leg-a { animation: csLeg .3s ease-in-out infinite; }
  .cs-leg-b { animation: csLeg .3s ease-in-out infinite reverse; }
  @keyframes csLeg { 0%,100% { transform: rotate(24deg); } 50% { transform: rotate(-24deg); } }
  .cs-tail { transform-box: fill-box; transform-origin: left center;
    animation: csTail .24s ease-in-out infinite; }
  @keyframes csTail { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(20deg); } }
  .crawl-caption { position: relative; height: 20px; width: 320px; max-width: 90%;
    text-align: center; margin-top: 2px; }
  .crawl-caption span { position: absolute; left: 0; right: 0; opacity: 0; font-size: 13px;
    color: var(--muted); animation: csCap 9s linear infinite; }
  .crawl-caption span:nth-child(2) { animation-delay: 3s; }
  .crawl-caption span:nth-child(3) { animation-delay: 6s; }
  @keyframes csCap { 0% { opacity: 0; } 3% { opacity: 1; } 30% { opacity: 1; } 34% { opacity: 0; }
    100% { opacity: 0; } }
  .bgscene { opacity: 0; animation: bgCycle 25s linear infinite; }
  .bgscene.bg2 { animation-delay: 5s; } .bgscene.bg3 { animation-delay: 10s; }
  .bgscene.bg4 { animation-delay: 15s; } .bgscene.bg5 { animation-delay: 20s; }
  @keyframes bgCycle { 0% { opacity: 0; } 3% { opacity: 1; } 18% { opacity: 1; } 21% { opacity: 0; }
    100% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .cs-ball, .cs-ball-bounce, .cs-dog, .cs-dog-bob, .cs-leg-a, .cs-leg-b, .cs-tail,
    .bgscene, .crawl-caption span { animation: none; }
    .crawl-caption span:nth-child(1), .bgscene.bg1 { opacity: 1; }
  }

  /* --- report --- */
  .report { padding: 20px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .report[hidden] { display: none; }
  .own-summary { background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 20px; }
  .own-summary .lbl { font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); font-weight: 600; }
  .own-summary h2 { margin: 4px 0 2px; font-size: 17px; }
  .own-summary .meta { color: var(--muted); font-size: 12.5px; }
  .legend-line { margin: 0 0 14px; font-size: 12.5px; color: var(--muted); }
  .legend-line b.sem { color: var(--semantic); } .legend-line b.lex { color: var(--lexical); }

  /* scatter */
  .scatter-panel { background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 22px; }
  .scatter-head { display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  .scatter-head h3 { margin: 0; font-size: 14px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .seg button { border: 0; background: #fff; padding: 5px 14px; font-size: 12.5px; cursor: pointer;
    color: var(--muted); }
  .seg button.active { background: var(--ink); color: #fff; font-weight: 600; }
  .scatter-note { margin: 0 0 10px; font-size: 12px; color: var(--muted); }
  .scatter-note code { background: var(--line); padding: 0 4px; border-radius: 4px; font-size: 11px; }
  .scatter svg { width: 100%; height: auto; display: block; }
  .scatter .axis-label { fill: var(--muted); font-size: 11px; }
  .scatter .quad-label { fill: #94a3b8; font-size: 10.5px; }
  .scatter .dot { fill: #64748b; }
  .scatter .dot-label { font-size: 11px; font-weight: 600; }
  .scatter .grid { stroke: var(--line); stroke-width: 1; }
  .cmp-card h3 .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 50%;
    margin-right: 7px; vertical-align: middle; }
  /* tabs */
  .tabs { display: flex; gap: 2px; padding: 0 24px; background: #fff;
    border-bottom: 1px solid var(--line); }
  .tab { border: 0; background: none; padding: 12px 16px; font-size: 13.5px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .tab-panel[hidden] { display: none; }
  .compose { padding: 18px 24px; border-bottom: 1px solid var(--line); background: #fff; }
  /* search history */
  #history { max-width: 1100px; margin: 0 auto; padding: 20px 24px; }
  .hist-h { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); }
  .hist-item { display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    padding: 10px 14px; background: #fff; border: 1px solid var(--line); border-radius: 9px;
    margin-bottom: 8px; text-decoration: none; color: var(--ink); }
  .hist-item:hover { border-color: #93c5fd; background: #f8fbff; }
  .hist-item .hi-main { font-size: 13.5px; }
  .hist-item .hi-vs { color: var(--muted); font-size: 12px; margin: 0 2px; }
  .hist-item .hi-meta { color: var(--muted); font-size: 12px; white-space: nowrap;
    font-variant-numeric: tabular-nums; }
  .hist-item .hi-status { margin-left: 8px; padding: 1px 7px; border-radius: 999px;
    background: #fef2f2; color: #b91c1c; font-size: 11px; }

  /* competitor cards */
  .cmp-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
  .cmp-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .cmp-card h3 { margin: 0; font-size: 15px; word-break: break-all; }
  .cmp-card .title { color: var(--muted); font-size: 12px; margin: 2px 0 12px; }
  .gauge-group { margin-top: 10px; }
  .gauge-group h4 { margin: 0 0 6px; font-size: 11.5px; text-transform: uppercase;
    letter-spacing: .03em; color: var(--muted); }
  .gauge { display: grid; grid-template-columns: 70px 1fr 58px; align-items: center; gap: 8px;
    margin: 4px 0; font-size: 12px; }
  .gauge .g-name { color: var(--muted); }
  .gauge .g-track { height: 7px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .gauge .g-track > span { display: block; height: 100%; border-radius: 999px; }
  .gauge.sem .g-track > span { background: var(--semantic); }
  .gauge.lex .g-track > span { background: var(--lexical); }
  .gauge .g-val { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .gauge .g-val.na { color: var(--muted); font-weight: 400; }
  .gauge .g-unit { font-size: 10px; color: var(--muted); font-weight: 400; }
  .scatter .tick { fill: var(--muted); font-size: 10px; }
  /* "Read the text we analysed" dropdown */
  .extracted { margin-top: 12px; }
  .extracted > summary { cursor: pointer; font-size: 12px; color: var(--semantic); font-weight: 600;
    list-style: none; }
  .extracted > summary::-webkit-details-marker { display: none; }
  .extracted > summary::before { content: "▸ "; color: var(--muted); }
  .extracted[open] > summary::before { content: "▾ "; }
  .ex-body { margin-top: 8px; }
  .ex-sec { margin-top: 8px; }
  .ex-sec h5 { margin: 0 0 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
    color: var(--muted); }
  .ex-sec ul { margin: 0; padding-left: 16px; }
  .ex-sec li { font-size: 12px; margin: 2px 0; color: var(--ink); }
  .shared { margin-top: 12px; }
  .shared .lbl { font-size: 11px; color: var(--muted); }
  .chip { display: inline-block; font-size: 11.5px; background: #fff7ed; color: #9a3412;
    border: 1px solid #fed7aa; border-radius: 999px; padding: 1px 8px; margin: 3px 3px 0 0; }
  .explain { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line);
    font-size: 12.5px; color: var(--ink); }
  .explain .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .03em; }
  .muted { color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Homepage Language Match</h1>
    <p>How close is your homepage's messaging to your competitors' — headlines and paragraphs, by meaning and by wording.</p>
  </header>

  <nav class="tabs">
    <button type="button" class="tab active" data-tab="compare">New comparison</button>
    <button type="button" class="tab" data-tab="history">Recent comparisons</button>
  </nav>

  <section id="tab-compare" class="tab-panel">
    <div class="compose">
      <form id="analyzeForm" class="form">
        <div class="field grow">
          <label for="ownDomain">Your domain</label>
          <input id="ownDomain" placeholder="acme.com" autocomplete="off" required />
        </div>
        <div class="field grow">
          <label for="compDomains">Competitor domains <span class="hint">(comma-separated, up to 5)</span></label>
          <input id="compDomains" placeholder="rival.com, other.com" autocomplete="off" />
        </div>
        <button id="analyzeBtn" type="submit">Compare</button>
      </form>
      <div id="status"></div>
    </div>
    <div id="progress" hidden></div>
    <div id="report" class="report" hidden></div>
  </section>

  <section id="tab-history" class="tab-panel" hidden>
    <div id="history"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
